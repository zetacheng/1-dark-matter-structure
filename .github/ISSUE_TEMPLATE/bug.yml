name: Reproducibility or implementation bug
description: Report an implementation, test, provenance, or reproducibility defect
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: defect
    attributes:
      label: Observed defect
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include branch, commit, command, configuration, inputs, and environment.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior or anchor
    validations:
      required: true
  - type: input
    id: gate
    attributes:
      label: Related gate
      placeholder: Gate ID or not applicable
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Scientific and paper impact
    validations:
      required: true
